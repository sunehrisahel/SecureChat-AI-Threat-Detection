# Render Blueprint — detector API + Red Team Console
# SecureChat on Vercel calls the Render detector (see chatbot/config.py default DETECTOR_URL).

services:
  - type: web
    name: securechat-detector-api
    runtime: python
    plan: free
    branch: main
    rootDir: prompt-injection-detector
    buildCommand: pip install -r requirements-prod.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SKIP_STARTUP_MODEL_LOAD
        value: "true"

  - type: web
    name: red-team-console
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r red_team/requirements.txt
    startCommand: >-
      streamlit run red_team/dashboard.py
      --server.port=$PORT
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: RED_TEAM_PASSWORD
        generateValue: true
      - key: DETECTOR_URL
        value: https://securechat-detector-api.onrender.com/analyze
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RED_TEAM_API_KEY
        sync: false
