# Render Blueprint — detector API + Red Team Console
# SecureChat stays on Vercel with an inline bundled detector (see chatbot/bundle_detector.sh).

services:
  - type: web
    name: prompt-injection-detector
    runtime: python
    plan: free
    branch: main
    rootDir: prompt-injection-detector
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DETECTOR_API_KEY
        generateValue: true

  - type: web
    name: red-team-console
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r red_team/requirements.txt
    startCommand: >-
      streamlit run red_team/dashboard.py
      --server.port=$PORT
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: RED_TEAM_PASSWORD
        generateValue: true
      - key: DETECTOR_URL
        value: https://prompt-injection-detector.onrender.com/analyze
      - key: DETECTOR_API_KEY
        fromService:
          type: web
          name: prompt-injection-detector
          envVarKey: DETECTOR_API_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RED_TEAM_API_KEY
        sync: false
